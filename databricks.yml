bundle:
  name: dabs_workshop

include:
  - resources/*.yml

variables:
  catalog:
  root_path:
    default: /Workspace/Users/yosathorn.ni@gmail.com/.bundle/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-4c78cc82-6083.cloud.databricks.com
      root_path: ${var.root_path}
    variables:
      catalog: dev
    resources:
      jobs:
        transform_gold:
          environments:
            - environment_key: default
              spec:
                environment_version: "4"

  prod:
    mode: production
    workspace:
      host: https://dbc-4c78cc82-6083.cloud.databricks.com
      root_path: ${var.root_path}
    artifacts:
      default:
        type: whl
        build: python3 -m build
        path: ./logic_packages/
    variables:
      catalog: prod
    resources:
      jobs:
        transform_gold:
          environments:
            - environment_key: default
              spec:
                environment_version: "4"
                dependencies:
                  - ./logic_packages/dist/*.whl
